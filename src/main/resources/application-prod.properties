# Production profile properties

# Server
server.servlet.context-path=/api

# Use a full JDBC URL from environment (e.g. JDBC DATABASE_URL or SUPABASE_DATABASE_URL)
spring.datasource.url=${SUPABASE_DATABASE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/studyflow}}
spring.datasource.username=${SUPABASE_DB_USER:${DATABASE_USERNAME:postgres}}
spring.datasource.password=${SUPABASE_DB_PASSWORD:${DATABASE_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate - in production we validate the schema and rely on Flyway for migrations
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Logging adjustments for production
logging.level.root=INFO
logging.level.co.studyflow=INFO

# Gemini API key must be provided via env
gemini.api.key=${GEMINI_API_KEY:}
