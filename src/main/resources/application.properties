spring.application.name=StudyFlow Backend

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/api

# Database Configuration (PostgreSQL)
### Database: allow configuring via Supabase/Railway env vars
# Prefer a full JDBC URL in SUPABASE_DATABASE_URL or DATABASE_URL (jdbc:...)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://db.prurgyuismfqmsiryixd.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:UAuwz70PWflEVZYL}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging
logging.level.root=INFO
logging.level.co.studyflow=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
gemini.max.timeout.seconds=30

# Application Configuration
app.name=StudyFlow
app.version=1.0.0
