# Perfil LOCAL - H2 en memoria, sin PostgreSQL ni Docker necesarios

# Base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:studyflow;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate crea las tablas automáticamente
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Desactivar Flyway (H2 usa ddl-auto)
spring.flyway.enabled=false

# Consola H2 (opcional: http://localhost:8080/api/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.co.studyflow=DEBUG
logging.level.org.springframework.web=INFO
